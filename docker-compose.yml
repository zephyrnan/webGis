services:
  webgis:
    build:
      context: .
      dockerfile: Dockerfile
    image: geosurgical-webgis:local
    container_name: geosurgical-webgis
    ports:
      - "${WEBGIS_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    container_name: geosurgical-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Expose Ollama API to the host for model management (optional)
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

volumes:
  ollama_data:
