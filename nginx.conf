server {
    # Nginx 在容器内部监听 80 端口。
    listen 80;
    server_name _;

    # Dockerfile 会把 Vite 构建出的 dist 复制到这个目录。
    root /usr/share/nginx/html;
    index index.html;

    # Worker + WASM 需要跨源隔离相关响应头，否则部分浏览器会加载失败。
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;
    # 本地开发/验证阶段禁止缓存，避免浏览器继续使用旧 JS 或旧 Worker 文件。
    add_header Cache-Control "no-store" always;

    # Content Security Policy — 限制脚本、样式、连接等来源
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; connect-src 'self' blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org http://localhost:* https://api.openai.com https://api.deepseek.com https://*.modelscope.cn https://*.sentry.io https://*.siliconflow.cn; worker-src 'self' blob:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # 给 Docker HEALTHCHECK 使用的轻量健康检查接口。
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # React 单页应用路由兜底：真实文件不存在时返回 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WASM 必须返回 application/wasm，否则浏览器可能拒绝或降级加载。
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # JS/CSS/图片/JSON 等静态资源直接按文件返回。
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|json)$ {
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }
}
